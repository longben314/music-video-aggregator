  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
    a { color: #333; text-decoration: none; }
    a:hover { color: #e74c3c; }
    
    /* Header */
    .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 15px; display: flex; align-items: center; gap: 20px; }
    .logo { font-size: 22px; font-weight: bold; color: #fff; white-space: nowrap; }
    .logo span { color: #e74c3c; }
    .search-box { flex: 1; display: flex; gap: 5px; }
    .search-box input { flex: 1; padding: 8px 12px; border: none; border-radius: 4px; font-size: 13px; max-width: 300px; }
    .search-box button { padding: 8px 15px; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    
    /* Nav */
    .nav { background: #fff; border-bottom: 1px solid #eee; padding: 0 15px; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 25px; overflow-x: auto; }
    .nav a { padding: 12px 0; color: #666; font-size: 14px; white-space: nowrap; border-bottom: 2px solid transparent; }
    .nav a:hover, .nav a.active { color: #e74c3c; border-bottom-color: #e74c3c; }
    
    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    
    /* Update Notice */
    .update-notice { background: #fff; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; color: #666; }
    .update-notice strong { color: #e74c3c; }
    
    /* Section */
    .section { background: #fff; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
    .section-header { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 15px; font-weight: bold; color: #333; }
    .section-more { font-size: 12px; color: #999; }
    
    /* List */
    .list { padding: 5px 0; }
    .list-item { display: flex; align-items: center; padding: 8px 15px; border-bottom: 1px solid #f9f9f9; }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }
    .item-score { width: 45px; color: #f59e0b; font-size: 13px; flex-shrink: 0; }
    .item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-title a { color: #333; }
    .item-meta { width: 280px; color: #999; font-size: 12px; flex-shrink: 0; display: none; }
    @media (min-width: 768px) { .item-meta { display: block; } }
    
    /* Card Style */
    .card-list { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; }
    .card-item { width: calc(50% - 5px); background: #fafafa; border-radius: 6px; padding: 12px; cursor: pointer; transition: all 0.2s; }
    @media (min-width: 640px) { .card-item { width: calc(25% - 8px); } }
    .card-item:hover { background: #f0f0f0; }
    .card-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-meta { font-size: 12px; color: #999; }
    .card-score { color: #f59e0b; font-size: 12px; margin-top: 5px; }
    
    /* Footer */
    .footer { background: #1a1a2e; color: #999; padding: 30px 15px; margin-top: 30px; text-align: center; font-size: 13px; }
    .footer a { color: #999; }
    .footer a:hover { color: #fff; }
    
    /* Play Modal */
    .play-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 200; flex-direction: column; }
    .play-modal.show { display: flex; }
    .play-header { padding: 12px 15px; background: rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; }
    .play-back { color: #fff; font-size: 14px; cursor: pointer; }
    .play-title { flex: 1; color: #fff; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .play-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; }
    .play-container iframe { width: 100%; height: 100%; max-width: 1000px; border: none; border-radius: 8px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 10px; padding: 10px 15px; background: #fafafa; overflow-x: auto; }
    .tab { padding: 6px 15px; background: #fff; border-radius: 20px; font-size: 12px; color: #666; cursor: pointer; white-space: nowrap; border: 1px solid #ddd; }
    .tab:hover, .tab.active { background: #e74c3c; color: #fff; border-color: #e74c3c; }
    
    /* Page */
    .page { display: none; }
    .page.active { display: block; }
    
    /* Loading */
    .loading { text-align: center; padding: 50px; color: #999; }
  </style>
</head>

    let currentFilter = { movies: 'all', tvs: 'all' }
    
    function createListItem(item, showScore = true) {
      const scoreHtml = showScore ? `<span class="item-score">${item.score}分</span>` : ''
      return `<div class="list-item">
        ${scoreHtml}
        <span class="item-title"><a href="#" onclick="playItem(${item.id}); return false;">${item.title}</a></span>
        <span class="item-meta">${item.year}/${item.country}/${item.type}</span>
      </div>`
    }
    
    function createCardItem(item) {
      return `<div class="card-item" onclick="playItem(${item.id})">
        <div class="card-title">${item.title}</div>
        <div class="card-meta">${item.year}/${item.country}</div>
        <div class="card-score">⭐ ${item.score}分 ${item.tag}</div>
      </div>`
    }
    
    function renderHomePage() {
      // 影片推荐 - 卡片形式
      const recommends = [...db.movies.slice(0, 4), ...db.tvs.slice(0, 4), ...db.varieties.slice(0, 2)]
      document.getElementById('recommendCards').innerHTML = recommends.map(m => createCardItem(m)).join('')
      
      // 最新电影
      document.getElementById('movieList').innerHTML = db.movies.slice(0, 10).map(m => createListItem(m)).join('')
      
      // 最热电影
      const hotMovies = [...db.movies].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      document.getElementById('hotMovieList').innerHTML = hotMovies.slice(0, 10).map((m, i) => createListItem(m, false)).join('')
      
      // 最新电视剧
      document.getElementById('tvList').innerHTML = db.tvs.slice(0, 10).map(t => createListItem(t)).join('')
      
      // 最热电视剧
      const hotTvs = [...db.tvs].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      document.getElementById('hotTvList').innerHTML = hotTvs.slice(0, 10).map((t, i) => createListItem(t, false)).join('')
      
      // 最新综艺
      document.getElementById('varietyList').innerHTML = db.varieties.slice(0, 10).map(v => createListItem(v)).join('')
      
      // 最热综艺
      const hotVarieties = [...db.varieties].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      document.getElementById('hotVarietyList').innerHTML = hotVarieties.slice(0, 10).map((v, i) => createListItem(v, false)).join('')
      
      // 最新动漫
      document.getElementById('animeList').innerHTML = db.animes.slice(0, 10).map(a => createListItem(a)).join('')
      
      // 最热动漫
      const hotAnimes = [...db.animes].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      document.getElementById('hotAnimeList').innerHTML = hotAnimes.slice(0, 10).map((a, i) => createListItem(a, false)).join('')
    }
    
    function renderMoviePage() {
      let list = currentFilter.movies === 'all' ? db.movies : db.movies.filter(m => m.type.includes(currentFilter.movies))
      document.getElementById('moviePageList').innerHTML = list.map(m => createListItem(m)).join('')
    }
    
    function renderTvPage() {
      let list = currentFilter.tvs === 'all' ? db.tvs : db.tvs.filter(t => t.country.includes(currentFilter.tvs))
      document.getElementById('tvPageList').innerHTML = list.map(t => createListItem(t)).join('')
    }
    
    function renderVarietyPage() {
      document.getElementById('varietyPageList').innerHTML = db.varieties.map(v => createListItem(v)).join('')
    }
    
    function renderAnimePage() {
      document.getElementById('animePageList').innerHTML = db.animes.map(a => createListItem(a)).join('')
    }
    
    function renderRankPage() {
      const rankMovies = [...db.movies].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      const rankTvs = [...db.tvs].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      const rankVarieties = [...db.varieties].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      const rankAnimes = [...db.animes].sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
      
      document.getElementById('rankMovieList').innerHTML = rankMovies.slice(0, 15).map((m, i) => createListItem(m, false)).join('')
      document.getElementById('rankTvList').innerHTML = rankTvs.slice(0, 15).map((t, i) => createListItem(t, false)).join('')
      document.getElementById('rankVarietyList').innerHTML = rankVarieties.slice(0, 15).map((v, i) => createListItem(v, false)).join('')
      document.getElementById('rankAnimeList').innerHTML = rankAnimes.slice(0, 15).map((a, i) => createListItem(a, false)).join('')
    }
    
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
      document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active')
      
      document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'))
      
      switch(page) {
        case 'home': renderHomePage(); break
        case 'movie': renderMoviePage(); break
        case 'tv': renderTvPage(); break
        case 'variety': renderVarietyPage(); break
        case 'anime': renderAnimePage(); break
        case 'rank': renderRankPage(); break
      }
      
      window.scrollTo(0, 0)
      return false
    }
    
    function filterList(el, type, listType) {
      document.querySelectorAll(`#${listType === 'movies' ? 'movieTabs' : 'tvTabs'} .tab`).forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      currentFilter[listType] = type
      if (listType === 'movies') renderMoviePage()
      else renderTvPage()
    }
    
    function playItem(id) {
      let item = null
      for (const cat of [db.movies, db.tvs, db.varieties, db.animes]) {
        item = cat.find(i => i.id === id)
        if (item) break
      }
      if (!item) return
      
      document.getElementById('playTitle').textContent = item.title
      document.getElementById('playFrame').src = item.url
      document.getElementById('playModal').classList.add('show')
    }
    
    function closePlayer() {
      document.getElementById('playModal').classList.remove('show')
      document.getElementById('playFrame').src = ''
    }
    
    function doSearch() {
      const kw = document.getElementById('searchInput').value.trim()
      if (kw) {
        alert('搜索: ' + kw + '\n\n功能开发中...')
      }
    }
    
    function handleSearch(e) {
      if (e.key === 'Enter') doSearch()
    }
    
    // 初始化
    renderHomePage()
  </script>
