<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>套住那只羊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
      background: linear-gradient(180deg, #a8e063 0%, #56ab2f 100%);
      min-height: 100vh;
      overflow: hidden;
    }
    
    /* 主菜单 */
    .menu-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .menu-screen.hidden { display: none; }
    
    .game-title {
      font-size: 36px;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }
    
    .menu-info {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 40px;
    }
    
    .menu-btn {
      width: 280px;
      height: 80px;
      border-radius: 40px;
      background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
      border: none;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      box-shadow: 0 6px 20px rgba(255,165,0,0.4);
      cursor: pointer;
      margin-bottom: 20px;
      transition: transform 0.2s;
    }
    
    .menu-btn:active { transform: scale(0.95); }
    
    .menu-items {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }
    
    .menu-item {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .menu-item img { width: 40px; height: 40px; }
    .menu-item span { font-size: 12px; color: #fff; margin-top: 5px; }
    
    .coins {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 30px;
    }
    
    .coins img { width: 30px; height: 30px; }
    .coins span { color: #ffd700; font-weight: bold; font-size: 18px; }
    
    /* 游戏界面 */
    .game-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      padding: 20px;
    }
    
    .game-screen.active { display: flex; }
    
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    
    .level-info {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    
    .game-back {
      width: 45px;
      height: 45px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .game-back img { width: 25px; height: 25px; }
    
    .game-board {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .board-grid {
      display: grid;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
    }
    
    .cell {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .cell:hover { transform: scale(1.1); }
    
    .cell.selected {
      box-shadow: 0 0 0 3px #ffd700;
      transform: scale(1.05);
    }
    
    .cell.blocked {
      background: #333;
      cursor: not-allowed;
    }
    
    .cell.empty { background: transparent; cursor: default; }
    
    .sheep-white {
      background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1), 0 3px 6px rgba(0,0,0,0.1);
    }
    
    .sheep-pink {
      background: linear-gradient(135deg, #ff6b9d 0%, #ee5a8b 100%);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15), 0 3px 6px rgba(255,107,157,0.3);
    }
    
    .sheep-purple {
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #3b82f6 100%);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15), 0 3px 6px rgba(168,85,247,0.3);
    }
    
    .sheep-black {
      background: linear-gradient(135deg, #4b5563 0%, #1f2937 100%);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3), 0 3px 6px rgba(0,0,0,0.4);
    }
    
    .rocket {
      position: absolute;
      width: 35px;
      height: 35px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
      font-size: 14px;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .game-footer {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    
    .game-btn {
      width: 100px;
      height: 60px;
      border-radius: 30px;
      background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,165,0,0.3);
      transition: transform 0.2s;
    }
    
    .game-btn:active { transform: scale(0.95); }
    
    .game-btn img { width: 30px; height: 30px; }
    .game-btn span { font-size: 12px; color: #fff; font-weight: bold; margin-top: 2px; }
    
    /* 消除动画 */
    .cell.removing {
      animation: remove 0.3s ease-out forwards;
    }
    
    @keyframes remove {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.5; }
      100% { transform: scale(0); opacity: 0; }
    }
    
    /* 胜利弹窗 */
    .win-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .win-modal.show { display: flex; }
    
    .win-content {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 300px;
      margin: 20px;
    }
    
    .win-title {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }
    
    .win-coins {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 20px;
    }
    
    .win-btn {
      width: 100%;
      height: 50px;
      border-radius: 25px;
      background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
      border: none;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
    }
    
    /* 提示信息 */
    .hint-text {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

  </div>
  
  <!-- 胜利弹窗 -->
  <div class="win-modal" id="winModal">
    <div class="win-content">
      <h2 class="win-title">🎉 恭喜过关！</h2>
      <p class="win-coins" id="winCoins">获得金币: 100</p>
      <button class="win-btn" id="nextLevelBtn">下一关</button>
    </div>
  </div>

  <script>
    // 游戏数据
    const COLORS = ['white', 'pink', 'purple'];
    const GRID_SIZE = 8;
    let currentLevel = 1;
    let coins = 871000;
    let board = [];
    let selectedCells = [];
    let score = 0;
    
    // DOM元素
    const menuScreen = document.getElementById('menuScreen');
    const gameScreen = document.getElementById('gameScreen');
    const boardGrid = document.getElementById('boardGrid');
    const levelInfo = document.getElementById('levelInfo');
    const hintText = document.getElementById('hintText');
    const coinCount = document.getElementById('coinCount');
    const winModal = document.getElementById('winModal');
    const winCoins = document.getElementById('winCoins');
    
    // 初始化游戏板
    function initBoard() {
      board = [];
      for (let i = 0; i < GRID_SIZE; i++) {
        board[i] = [];
        for (let j = 0; j < GRID_SIZE; j++) {
          // 随机放置羊，避开中心位置（狗的位置）
          if (i >= 3 && i <= 4 && j >= 3 && j <= 4) {
            board[i][j] = i === 3 && j === 3 ? 'black' : '';
          } else {
            board[i][j] = COLORS[Math.floor(Math.random() * COLORS.length)];
          }
        }
      }
      renderBoard();
    }
    
    // 渲染游戏板
    function renderBoard() {
      boardGrid.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 40px)`;
      boardGrid.innerHTML = '';
      
      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = i;
          cell.dataset.col = j;
          
          if (board[i][j] === 'black') {
            cell.classList.add('sheep-black');
          } else if (board[i][j]) {
            cell.classList.add(`sheep-${board[i][j]}`);
            cell.addEventListener('click', () => handleCellClick(i, j));
          } else {
            cell.classList.add('empty');
          }
          
          boardGrid.appendChild(cell);
        }
      }
    }
    
    // 处理格子点击
    function handleCellClick(row, col) {
      const color = board[row][col];
      if (!color || color === 'black') return;
      
      // 查找所有相邻的同色羊
      const connected = findConnected(row, col, color);
      
      if (connected.length >= 2) {
        // 高亮显示选中的羊
        selectedCells.forEach(([r, c]) => {
          document.querySelector(`[data-row="${r}"][data-col="${c}"]`).classList.remove('selected');
        });
        
        selectedCells = connected;
        
        connected.forEach(([r, c]) => {
          const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
          cell.classList.add('selected');
        });
        
        // 延迟消除
        setTimeout(() => {
          removeSelected();
        }, 200);
      } else {
        hintText.textContent = '至少需要2只相邻的羊才能消除！';
      }
    }
    
    // 查找相邻的同色羊（连通分量）
    function findConnected(startRow, startCol, color) {
      const visited = new Set();
      const connected = [];
      const stack = [[startRow, startCol]];
      
      while (stack.length > 0) {
        const [row, col] = stack.pop();
        const key = `${row}-${col}`;
        
        if (visited.has(key)) continue;
        if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) continue;
        if (board[row][col] !== color) continue;
        
        visited.add(key);
        connected.push([row, col]);
        
        // 检查四个方向
        stack.push([row - 1, col]);
        stack.push([row + 1, col]);
        stack.push([row, col - 1]);
        stack.push([row, col + 1]);
      }
      
      return connected;
    }
    
    // 消除选中的羊
    function removeSelected() {
      if (selectedCells.length === 0) return;
      
      const points = selectedCells.length * 10;
      score += points;
      coins += Math.floor(selectedCells.length / 2);
      updateCoinDisplay();
      
      // 添加消除动画
      selectedCells.forEach(([r, c]) => {
        const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
        cell.classList.add('removing');
      });
      
      // 移除羊并填充上方的羊
      setTimeout(() => {
        // 标记要移除的位置
        selectedCells.forEach(([r, c]) => {
          board[r][c] = '';
        });
        
        // 从下往上处理每一列
        for (let col = 0; col < GRID_SIZE; col++) {
          let emptyRow = GRID_SIZE - 1;
          
          // 从底部向上遍历
          for (let row = GRID_SIZE - 1; row >= 0; row--) {
            if (board[row][col] && board[row][col] !== 'black') {
              if (row !== emptyRow) {
                board[emptyRow][col] = board[row][col];
                board[row][col] = '';
              }
              emptyRow--;
            } else if (board[row][col] === 'black') {
              // 狗的位置保持不动
              emptyRow = row - 1;
            }
          }
          
          // 填充新的羊
          for (let row = emptyRow; row >= 0; row--) {
            if (board[row][col] !== 'black') {
              board[row][col] = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
          }
        }
        
        selectedCells = [];
        renderBoard();
        checkWin();
      }, 300);
    }
    
    // 检查是否获胜
    function checkWin() {
      let hasValidMove = false;
      
      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          if (board[i][j] && board[i][j] !== 'black') {
            const connected = findConnected(i, j, board[i][j]);
            if (connected.length >= 2) {
              hasValidMove = true;
              break;
            }
          }
        }
        if (hasValidMove) break;
      }
      
      if (!hasValidMove) {
        // 如果没有可消除的，自动洗牌
        shuffleBoard();
      }
    }
    
    // 洗牌
    function shuffleBoard() {
      const cells = [];
      
      // 收集所有非空非狗的位置
      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          if (board[i][j] && board[i][j] !== 'black') {
            cells.push([i, j]);
          }
        }
      }
      
      // 随机打乱颜色
      const colors = cells.map(([i, j]) => board[i][j]);
      for (let i = colors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [colors[i], colors[j]] = [colors[j], colors[i]];
      }
      
      // 重新分配颜色
      cells.forEach(([i, j], idx) => {
        board[i][j] = colors[idx];
      });
      
      renderBoard();
      checkWin();
    }
    
    // 更新金币显示
    function updateCoinDisplay() {
      if (coins >= 10000) {
        coinCount.textContent = (coins / 10000).toFixed(1) + '万';
      } else {
        coinCount.textContent = coins.toString();
      }
    }
    
    // 显示胜利弹窗
    function showWinModal() {
      const levelCoins = currentLevel * 50;
      coins += levelCoins;
      winCoins.textContent = `获得金币: ${levelCoins}`;
      updateCoinDisplay();
      winModal.classList.add('show');
    }
    
    // 开始游戏
    function startGame() {
      menuScreen.classList.add('hidden');
      gameScreen.classList.add('active');
      initBoard();
    }
    
    // 返回菜单
    function backToMenu() {
      gameScreen.classList.remove('active');
      menuScreen.classList.remove('hidden');
      winModal.classList.remove('show');
    }
    
    // 下一关
    function nextLevel() {
      currentLevel++;
      levelInfo.textContent = `第${currentLevel}关`;
      winModal.classList.remove('show');
      score = 0;
      initBoard();
    }
    
    // 事件监听
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('gameBack').addEventListener('click', backToMenu);
    document.getElementById('shuffleBtn').addEventListener('click', shuffleBoard);
    document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
    
    // 翻转功能（简单实现：旋转颜色）
    document.getElementById('flipBtn').addEventListener('click', () => {
      const colorMap = { white: 'pink', pink: 'purple', purple: 'white' };
      
      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          if (board[i][j] && board[i][j] !== 'black') {
            board[i][j] = colorMap[board[i][j]];
          }
        }
      }
      
      renderBoard();
    });
    
    // 移除功能（随机移除一只羊）
    document.getElementById('removeBtn').addEventListener('click', () => {
      const cells = [];
      
      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          if (board[i][j] && board[i][j] !== 'black') {
            cells.push([i, j]);
          }
        }
      }
      
      if (cells.length > 0) {
        const [r, c] = cells[Math.floor(Math.random() * cells.length)];
        board[r][c] = '';
        renderBoard();
      }
    });
  </script>
</body>
</html>
