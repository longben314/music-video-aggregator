<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>影视导航 - 全网影视资源聚合</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
    a { color: #333; text-decoration: none; }
    a:hover { color: #e74c3c; }
    
    .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 15px; display: flex; align-items: center; gap: 20px; }
    .logo { font-size: 22px; font-weight: bold; color: #fff; white-space: nowrap; }
    .logo span { color: #e74c3c; }
    .search-box { flex: 1; display: flex; gap: 5px; }
    .search-box input { flex: 1; padding: 8px 12px; border: none; border-radius: 4px; font-size: 13px; max-width: 300px; }
    .search-box button { padding: 8px 15px; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    
    .nav { background: #fff; border-bottom: 1px solid #eee; padding: 0 15px; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 25px; overflow-x: auto; }
    .nav a { padding: 12px 0; color: #666; font-size: 14px; white-space: nowrap; border-bottom: 2px solid transparent; }
    .nav a:hover, .nav a.active { color: #e74c3c; border-bottom-color: #e74c3c; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    
    .update-notice { background: #fff; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; color: #666; }
    .update-notice strong { color: #e74c3c; }
    
    .section { background: #fff; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
    .section-header { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 15px; font-weight: bold; color: #333; }
    .section-more { font-size: 12px; color: #999; cursor: pointer; }
    
    .list { padding: 5px 0; }
    .list-item { display: flex; align-items: center; padding: 8px 15px; border-bottom: 1px solid #f9f9f9; }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }
    .item-score { width: 45px; color: #f59e0b; font-size: 13px; flex-shrink: 0; }
    .item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .item-title:hover { color: #e74c3c; }
    .item-meta { width: 280px; color: #999; font-size: 12px; flex-shrink: 0; display: none; }
    @media (min-width: 768px) { .item-meta { display: block; } }
    
    .tabs { display: flex; gap: 10px; padding: 10px 15px; background: #fafafa; overflow-x: auto; }
    .tab { padding: 6px 15px; background: #fff; border-radius: 20px; font-size: 12px; color: #666; cursor: pointer; white-space: nowrap; border: 1px solid #ddd; }
    .tab:hover, .tab.active { background: #e74c3c; color: #fff; border-color: #e74c3c; }
    
    .page { display: none; }
    .page.active { display: block; }
    
    .footer { background: #1a1a2e; color: #999; padding: 30px 15px; margin-top: 30px; text-align: center; font-size: 13px; }
    .footer a { color: #999; }
    .footer a:hover { color: #fff; }
    
    /* Player Modal */
    .player-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 200; flex-direction: column; }
    .player-modal.show { display: flex; }
    .player-header { padding: 12px 15px; background: rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; }
    .player-back { color: #fff; font-size: 14px; cursor: pointer; padding: 5px 10px; background: rgba(255,255,255,0.2); border-radius: 4px; }
    .player-back:hover { background: rgba(255,255,255,0.3); }
    .player-title { flex: 1; color: #fff; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-sources { display: flex; gap: 8px; }
    .source-btn { padding: 5px 12px; background: rgba(255,255,255,0.2); border-radius: 4px; color: #fff; font-size: 12px; cursor: pointer; border: none; }
    .source-btn:hover, .source-btn.active { background: #e74c3c; }
    .player-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
    .player-container iframe { width: 100%; height: 100%; max-width: 1200px; border: none; border-radius: 8px; background: #000; }
    .player-loading { position: absolute; color: #fff; font-size: 14px; }
    
    /* Video Sources */
    .sources-panel { background: #fff; padding: 15px; border-radius: 6px; margin-top: 10px; }
    .sources-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #333; }
    .sources-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .sources-list a { padding: 6px 15px; background: #f5f5f5; border-radius: 4px; font-size: 13px; color: #333; }
    .sources-list a:hover { background: #e74c3c; color: #fff; }
  </style>
</head>

        <span class="item-meta">${item.year}/${item.country}/${item.type}</span>

    function renderHomePage() {
      const recommends = [...db.movies.slice(0, 3), ...db.tvs.slice(0, 3), ...db.varieties.slice(0, 2), ...db.animes.slice(0, 2)]
      document.getElementById('recommendList').innerHTML = recommends.map(m => createListItem(m)).join('')
      document.getElementById('movieList').innerHTML = db.movies.map(m => createListItem(m)).join('')
      document.getElementById('tvList').innerHTML = db.tvs.map(t => createListItem(t)).join('')
      document.getElementById('varietyList').innerHTML = db.varieties.map(v => createListItem(v)).join('')
      document.getElementById('animeList').innerHTML = db.animes.map(a => createListItem(a)).join('')
    }
    
    function renderMoviePage() {
      let list = currentFilter.movies ? db.movies.filter(m => m.type.includes(currentFilter.movies)) : db.movies
      document.getElementById('moviePageList').innerHTML = list.map(m => createListItem(m)).join('')
    }
    
    function renderTvPage() {
      let list = currentFilter.tvs ? db.tvs.filter(t => t.country.includes(currentFilter.tvs)) : db.tvs
      document.getElementById('tvPageList').innerHTML = list.map(t => createListItem(t)).join('')
    }
    
    function renderVarietyPage() {
      document.getElementById('varietyPageList').innerHTML = db.varieties.map(v => createListItem(v)).join('')
    }
    
    function renderAnimePage() {
      document.getElementById('animePageList').innerHTML = db.animes.map(a => createListItem(a)).join('')
    }
    
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
      document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active')
      document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'))
      event && event.target && (event.target.className = 'active')
      
      switch(page) {
        case 'home': renderHomePage(); break
        case 'movie': renderMoviePage(); break
        case 'tv': renderTvPage(); break
        case 'variety': renderVarietyPage(); break
        case 'anime': renderAnimePage(); break
      }
      window.scrollTo(0, 0)
      return false
    }
    
    function filterMovies(el, type) {
      document.querySelectorAll('#movieTabs .tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      currentFilter.movies = type
      renderMoviePage()
    }
    
    function filterTVs(el, type) {
      document.querySelectorAll('#tvTabs .tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      currentFilter.tvs = type
      renderTvPage()
    }
    
    function playItem(id) {
      let item = null
      for (const cat of [db.movies, db.tvs, db.varieties, db.animes]) {
        item = cat.find(i => i.id === id)
        if (item) break
      }
      if (!item) return
      
      currentItem = item
      currentSource = 0
      document.getElementById('playerTitle').textContent = item.title
      document.querySelectorAll('.source-btn').forEach((btn, i) => btn.classList.toggle('active', i === 0))
      
      loadPlayer()
      document.getElementById('playerModal').classList.add('show')
    }
    
    function loadPlayer() {
      if (!currentItem) return
      const baseUrl = playerSources[currentSource]
      const url = baseUrl + currentItem.id + '-1-1.html'
      document.getElementById('playerFrame').src = url
    }
    
    function switchSource(idx) {
      currentSource = idx
      document.querySelectorAll('.source-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx))
      loadPlayer()
    }
    
    function closePlayer() {
      document.getElementById('playerModal').classList.remove('show')
      document.getElementById('playerFrame').src = ''
      currentItem = null
    }
    
    function doSearch() {
      const kw = document.getElementById('searchInput').value.trim()
      if (kw) {
        alert('搜索: ' + kw + '\n\n功能开发中...')
      }
    }
    
    // 初始化
    renderHomePage()
  </script>
</body>
</html>
