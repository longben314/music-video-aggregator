<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVBOX 后台管理</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .admin-header {
      background: #1e293b;
      padding: 1rem 1.5rem;
      color: white;
    }
    
    .admin-header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-main {
      padding: 2rem 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .admin-card {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
    }
    
    .admin-nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e2e8f0;
    }
    
    .admin-nav-item {
      padding: 0.75rem 1.5rem;
      color: #64748b;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    
    .admin-nav-item:hover, .admin-nav-item.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .admin-page {
      display: none;
    }
    
    .admin-page.active {
      display: block;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1.5rem;
      border-radius: 1rem;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    
    .stat-label {
      opacity: 0.9;
    }
    
    .table-container {
      overflow-x: auto;
    }
    
    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }
    
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    
    .btn-danger:hover {
      background: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="admin-header">
      <div class="admin-header-content">
        <a href="index.html" class="logo" style="text-decoration: none;">
          <span class="logo-icon">📺</span>
          <span class="logo-text">TVBOX 后台管理</span>
        </a>
        <div style="display: flex; align-items: center; gap: 1rem;">
          <span id="admin-greeting" style="opacity: 0.9;"></span>
          <button class="btn btn-outline" style="border-color: white; color: white;" onclick="logout()">退出登录</button>
        </div>
      </div>
    </header>
    
    <main class="admin-main">
      <nav class="admin-nav">
        <button class="admin-nav-item active" onclick="switchAdminTab('dashboard')">概览</button>
        <button class="admin-nav-item" onclick="switchAdminTab('sources')">视频源管理</button>
        <button class="admin-nav-item" onclick="switchAdminTab('history')">播放历史</button>
        <button class="admin-nav-item" onclick="switchAdminTab('settings')">设置</button>
      </nav>
      
      <!-- 概览页面 -->
      <div id="admin-dashboard" class="admin-page active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="stat-sources">0</div>
            <div class="stat-label">视频源</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-history">0</div>
            <div class="stat-label">播放历史</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-active">0</div>
            <div class="stat-label">活跃源</div>
          </div>
        </div>
        
        <div class="admin-card">
          <h3 style="margin-bottom: 1rem; color: #1e293b;">快速操作</h3>
          <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="switchAdminTab('sources')">管理视频源</button>
            <button class="btn btn-outline" onclick="window.location.href='index.html'">访问前台</button>
          </div>
        </div>
      </div>
      
      <!-- 视频源管理 -->
      <div id="admin-sources" class="admin-page">
        <div class="admin-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3 style="color: #1e293b;">视频源列表</h3>
            <button class="btn btn-primary" onclick="showAddSourceModal()">添加视频源</button>
          </div>
          
          <div class="table-container">
            <table id="admin-sources-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>名称</th>
                  <th>URL</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
      <!-- 播放历史 -->
      <div id="admin-history" class="admin-page">
        <div class="admin-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3 style="color: #1e293b;">播放历史</h3>
            <button class="btn btn-danger btn-sm" onclick="clearAllHistory()">清空历史</button>
          </div>
          
          <div id="history-list" style="display: grid; gap: 1rem;">
          </div>
        </div>
      </div>
      
      <!-- 设置 -->
      <div id="admin-settings" class="admin-page">
        <div class="admin-card">
          <h3 style="color: #1e293b; margin-bottom: 1.5rem;">系统设置</h3>
          
          <div class="form-group">
            <label>修改密码</label>
            <input type="password" id="new-password" placeholder="请输入新密码">
          </div>
          
          <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirm-password" placeholder="请再次输入新密码">
          </div>
          
          <div class="form-actions">
            <button class="btn btn-primary" onclick="changePassword()">保存</button>
          </div>
        </div>
      </div>
    </main>
    
    <footer class="footer">
      <p>&copy; 2026 TVBOX. All rights reserved.</p>
    </footer>
  </div>
  
  <!-- 添加视频源弹窗 -->
  <div id="add-source-modal" class="modal">
    <div class="modal-content">
      <h3 class="modal-title">添加视频源</h3>
      <div class="form-group">
        <label>源名称</label>
        <input type="text" id="add-source-name" placeholder="请输入名称">
      </div>
      <div class="form-group">
        <label>源地址</label>
        <input type="text" id="add-source-url" placeholder="请输入URL">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="addNewSource()">添加</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="admin-toast"></div>
  
  <script src="assets/js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initAdmin);
    
    function initAdmin() {
      if (!AuthManager.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }
      
      const user = AuthManager.getUser();
      document.getElementById('admin-greeting').textContent = `欢迎, ${user.username}`;
      
      loadDashboardStats();
      loadAdminSources();
      loadHistory();
    }
    
    function switchAdminTab(tab) {
      document.querySelectorAll('.admin-nav-item').forEach(item => {
        item.classList.toggle('active', item.textContent.includes(tab === 'dashboard' ? '概览' : 
          tab === 'sources' ? '视频源' : 
          tab === 'history' ? '播放历史' : '设置'));
      });
      
      document.querySelectorAll('.admin-page').forEach(page => {
        page.classList.remove('active');
      });
      
      document.getElementById(`admin-${tab}`).classList.add('active');
    }
    
    function loadDashboardStats() {
      const sources = SourceManager.getSources();
      const history = HistoryManager.getHistory();
      
      document.getElementById('stat-sources').textContent = sources.length;
      document.getElementById('stat-history').textContent = history.length;
      document.getElementById('stat-active').textContent = sources.filter(s => s.active).length;
    }
    
    function loadAdminSources() {
      const sources = SourceManager.getSources();
      const tbody = document.querySelector('#admin-sources-table tbody');
      
      tbody.innerHTML = sources.map(source => `
        <tr>
          <td>${source.id}</td>
          <td>${source.name}</td>
          <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${source.url}</td>
          <td>
            <span class="source-card-status ${source.active ? 'status-active' : 'status-inactive'}">
              ${source.active ? '已启用' : '已禁用'}
            </span>
          </td>
          <td>
            <div class="action-buttons">
              <button class="btn btn-sm btn-outline" onclick="toggleSourceInAdmin(${source.id})">
                ${source.active ? '禁用' : '启用'}
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteSourceInAdmin(${source.id})">删除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    
    function loadHistory() {
      const history = HistoryManager.getHistory();
      const container = document.getElementById('history-list');
      
      if (history.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📺</div><p>暂无播放历史</p></div>';
        return;
      }
      
      container.innerHTML = history.map(item => `
        <div class="source-card">
          <div class="source-card-header">
            <h3 class="source-card-title">${item.title}</h3>
            <span class="source-card-status status-active">播放 ${item.playCount || 1} 次</span>
          </div>
          <p style="color: #64748b; font-size: 0.875rem; margin-bottom: 0.5rem;">
            最后播放: ${new Date(item.lastPlayed).toLocaleString()}
          </p>
          <p class="source-card-url">${item.sourceUrl || '未知源'}</p>
        </div>
      `).join('');
    }
    
    function showAddSourceModal() {
      document.getElementById('add-source-modal').classList.add('show');
    }
    
    function addNewSource() {
      const name = document.getElementById('add-source-name').value.trim();
      const url = document.getElementById('add-source-url').value.trim();
      
      if (!name || !url) {
        showAdminToast('请填写完整信息');
        return;
      }
      
      SourceManager.addSource({ name, url });
      document.getElementById('add-source-modal').classList.remove('show');
      loadAdminSources();
      loadDashboardStats();
      showAdminToast('添加成功');
    }
    
    function toggleSourceInAdmin(id) {
      SourceManager.toggleActive(id);
      loadAdminSources();
      loadDashboardStats();
    }
    
    function deleteSourceInAdmin(id) {
      if (confirm('确定要删除此源吗？')) {
        SourceManager.deleteSource(id);
        loadAdminSources();
        loadDashboardStats();
        showAdminToast('删除成功');
      }
    }
    
    function clearAllHistory() {
      if (confirm('确定要清空所有播放历史吗？')) {
        HistoryManager.clearHistory();
        loadHistory();
        loadDashboardStats();
        showAdminToast('已清空');
      }
    }
    
    function changePassword() {
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      
      if (!newPassword || newPassword !== confirmPassword) {
        showAdminToast('密码不一致');
        return;
      }
      
      if (AuthManager.changePassword(newPassword)) {
        showAdminToast('密码已更新');
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
      }
    }
    
    function logout() {
      AuthManager.logout();
      window.location.href = 'index.html';
    }
    
    function showAdminToast(text) {
      const toast = document.getElementById('admin-toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function closeModal() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
    }
  </script>
</body>
</html>
